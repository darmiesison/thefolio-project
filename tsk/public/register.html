<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | All About Cats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container">
        <img src="assets/logo-cat.png" alt="All About Cats Logo" class="logo">
        <h1>All About Cats</h1>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a class="active" href="register.html">Register</a></li>
        </ul>
    </nav>
</header>

<main>

<section>
    <h2 id="reg-header">Join the Cat Lovers Community</h2>
    <p id="reg-para">
        By signing up, you will receive fun cat facts, basic care tips, and updates related to cats and pet awareness.
    </p>
</section>

<section>
    <form>
        <label>Full Name</label>
        <input type="text">

        <label>Preferred Username</label>
        <input type="text">

        <label>Date of Birth</label>
        <input type="date">

        <p>Interest Level</p>
        <label><input type="radio" name="level"> Low</label>
        <label><input type="radio" name="level"> Moderate</label>
        <label><input type="radio" name="level"> High</label>

        <label>
            <input type="checkbox"> I agree to the terms and conditions
        </label>

        <button type="submit">Register</button>
    </form>
</section>

</main>

<footer>
    <p>Contact: allaboutcats@email.com</p>
    <p>© 2026 All About Cats</p>
</footer>

</body>
</html>
